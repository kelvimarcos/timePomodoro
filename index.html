<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Time Pomodoro — Gerencie seu tempo com foco e produtividade usando a técnica Pomodoro.">
    <title>Time Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-wrapper">

        <!-- Header -->
        <header class="app-header" id="app-header">
            <h1 class="logo">time<span>pomodoro</span></h1>
            <div class="header-right">
                <button class="sound-toggle" id="soundToggle" aria-label="Alternar som">
                    Som: ON
                </button>
            </div>
        </header>

        <!-- Main Card -->
        <main class="pomodoro-card" id="pomodoro-card">

            <!-- Mode Tabs -->
            <div class="mode-tabs" id="modeTabs">
                <button class="mode-tab active" data-mode="focus" id="tab-focus">Foco</button>
                <button class="mode-tab" data-mode="short" id="tab-short">Pausa Curta</button>
                <button class="mode-tab" data-mode="long" id="tab-long">Pausa Longa</button>
            </div>

            <!-- Timer Ring -->
            <div class="timer-ring-wrapper" id="timer-ring-wrapper">
                <svg class="timer-ring" viewBox="0 0 260 260">
                    <circle class="timer-ring-bg" cx="130" cy="130" r="120" />
                    <circle class="timer-ring-progress" id="timerProgress" cx="130" cy="130" r="120" />
                </svg>
                <div class="timer-display" id="timerDisplay">
                    <span class="timer-minutes" id="minutes">25</span>
                    <span class="timer-separator">:</span>
                    <span class="timer-seconds" id="seconds">00</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls" id="controls">
                <button class="btn btn-primary" id="startBtn">Iniciar</button>
                <button class="btn btn-secondary" id="resetBtn">Resetar</button>
            </div>

            <!-- Session Counter -->
            <div class="session-info" id="sessionInfo">
                <div class="session-dots" id="sessionDots">
                    <span class="dot" data-index="0"></span>
                    <span class="dot" data-index="1"></span>
                    <span class="dot" data-index="2"></span>
                    <span class="dot" data-index="3"></span>
                </div>
                <p class="session-text" id="sessionText">Sessão 1 de 4</p>
            </div>

        </main>

        <!-- Task List -->
        <section class="tasks-section" id="tasks-section">
            <div class="tasks-header">
                <h2>Tarefas</h2>
                <button class="clear-done-btn" id="clearDoneBtn">Limpar concluídas</button>
            </div>
            <form class="task-form" id="taskForm">
                <input
                    type="text"
                    class="task-input"
                    id="taskInput"
                    placeholder="Adicionar nova tarefa..."
                    maxlength="120"
                    autocomplete="off"
                >
                <button type="submit" class="btn btn-add">+</button>
            </form>
            <ul class="task-list" id="taskList">
                <!-- Tasks rendered by JS -->
            </ul>
            <p class="tasks-empty" id="tasksEmpty">Nenhuma tarefa adicionada.</p>
        </section>

        <!-- Keyboard Shortcuts -->
        <footer class="shortcuts-bar" id="shortcutsBar">
            <span><kbd>Espaço</kbd> Iniciar/Pausar</span>
            <span><kbd>R</kbd> Resetar</span>
            <span><kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> Modos</span>
        </footer>

    </div>
